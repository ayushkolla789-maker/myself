<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Kolla - Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js" class="particles-bg"></div>
    
    <nav class="navbar">
        <div class="logo">AYUSH KOLLA</div>
        <ul class="menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#hobbies">Hobbies</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <h1 class="name">AYUSH</h1>
        <h2 class="surname">KOLLA</h2>
        <div class="interests">
            <span class="interest">Tech Enthusiast</span>
            <span class="interest">Full Stack Developer</span>
            <span class="interest">Game Designer</span>
            <span class="interest">Entrepreneur</span>
        </div>
    </section>

    <section id="projects" class="projects">
        <h2>Projects</h2>
        <div class="project-grid">
            <div class="project-card" onclick="openModal('Farmer Forward', 'Cool design farmer support platform with responsive UI and agritech features.')">
                <h3>1. Farmer Forward</h3>
                <p>Click for details</p>
            </div>
            <div class="project-card" onclick="openModal('B-TRADE', 'Trading app with full-stack implementation.')">
                <h3>2. B-TRADE</h3>
                <p>Click for details</p>
            </div>
        </div>
    </section>

    <section id="hobbies" class="hobbies">
        <h2>Hobbies</h2>
        <ul class="hobby-list">
            <li onclick="animateHobby(this)">Badminton</li>
            <li onclick="animateHobby(this)">Cricket</li>
            <li onclick="animateHobby(this)">Basketball</li>
        </ul>
    </section>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
